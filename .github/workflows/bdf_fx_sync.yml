name: Sync BdF FX rates to Pigment

on:
  # Runs on the 3rd of each month at 08:00 UTC
  # (BdF publishes the prior month's rates around the 3rd-4th)
  schedule:
    - cron: "0 8 3 * *"

  # Allow manual trigger with a custom period
  workflow_dispatch:
    inputs:
      period:
        description: "Month to sync (YYYY-MM). Leave empty to use previous month."
        required: false
        default: ""
      dry_run:
        description: "Set to 'true' to print the payload without writing to Pigment."
        required: false
        default: "false"

jobs:
  sync-fx-rates:
    name: Sync exchange rates
    runs-on: ubuntu-latest

    # Allow the job to commit the audit trail back to the repository.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Resolve target period
        id: period
        run: |
          if [ -n "${{ github.event.inputs.period }}" ]; then
            echo "value=${{ github.event.inputs.period }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date -d 'last month' +'%Y-%m')" >> "$GITHUB_OUTPUT"
          fi

      - name: Run sync
        env:
          PIGMENT_API_KEY: ${{ secrets.PIGMENT_API_KEY }}
          PIGMENT_IMPORT_CONFIG_ID: ${{ secrets.PIGMENT_IMPORT_CONFIG_ID }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/bdf_fx_sync.py --period "${{ steps.period.outputs.value }}" $DRY_RUN_FLAG

      - name: Commit audit trail
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fx_rates/
          if git diff --cached --quiet; then
            echo "No audit-trail changes to commit."
          else
            git commit -m "Add FX daily-rate audit trail for ${{ steps.period.outputs.value }}"
            git push
          fi
